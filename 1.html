Experiment 1: Smart Login Page with Attempt Tracker 
(Closures + Validation) 
<!DOCTYPE html> 
<html> 
<head> 
    <title>Simple Login</title> 
    <style> 
        body { 
            font-family: Arial; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: rgb(241, 3, 43); 
        } 
        .box { 
            background: rgb(255, 230, 5); 
            padding: 20px; 
            width: 300px; 
            text-align: center; 
        } 
        input { 
            width: 100%; 
            padding: 8px; 
 
            margin: 8px 0; 
        } 
        button { 
            width: 100%; 
            padding: 8px; 
        } 
        .error { 
            color: red; 
            font-size: 14px; 
        } 
        @media (max-width: 400px) { 
            .box { 
                width: 90%; 
            } 
        } 
    </style> 
</head> 
<body> 
<div class="box"> 
    <h3>Login</h3> 
    <input type="text" id="user" placeholder="Username"> 
    <input type="password" id="pass" placeholder="Password"> 
    <div class="error" id="msg"></div> 
    <button onclick="login()">Login</button> 
 
</div> 
<script> 
    const button=document.querySelector(".btn"); 
    let maxAttempt=3; 
    let attempts=0; 
    button.addEventListener("click,()=>" { 
        attempts++; 
        if(attempts>=maxAttempt){ 
            button.disabled=true; 
            alert("maximum attempts are reached"); 
        } 
    }) 
    </script> 
    </body> 
    </html>
